id: core-naming
order: 31
name: "Naming Conventions"
description: "Create predictable, descriptive, and English-first names for all code elements."
category: quality
level: [beginner, experienced]
platform: [all]
language: [all]
tags: [naming, conventions, readability, english, code-style]
use_with: [core-architecture]
principles:
  - name: "English First"
    summary: "All code identifiers in English — always. Other languages only for user-facing text or specific local contexts."
    what: "Every variable, function, class, file, and commit message is written in English. The only exception is content that the end user reads directly in their local language."
    why: "Code is read globally. English identifiers work with all documentation, all Stack Overflow answers, and all AI tools. Mixed-language code forces every reader to switch contexts."
    without: "Mixing local languages into a codebase breaks autocomplete context, confuses global AI tools, and blocks collaboration with international developers."
    bad: |
      const utente = await getUtente(id)
      const carrello = utente.carrelloAttuale
      if (carrello.articoli.length === 0) return null
    good: |
      const user = await getUser(id)
      const cart = user.currentCart
      if (cart.items.length === 0) return null

  - name: "Descriptive Over Short"
    summary: "currentUser not usr. getUserById not getUsr. Full words, no abbreviations."
    what: "Names say exactly what they represent. No single-letter variables (except loop indices), no truncations, no cryptic abbreviations."
    why: "Code is read far more often than written. A descriptive name is free documentation. It removes the need for a comment explaining what the variable holds."
    without: "usr, tmp, data, x — these names carry zero information. Every reader has to trace the code backwards to understand what the variable actually is."
    bad: |
      const u = await getUsr(id)
      const d = u.dta
      const r = calc(d, cfg)
      return fmt(r)
    good: |
      const currentUser = await getUserById(userId)
      const subscriptionData = currentUser.subscription
      const renewalPrice = calculateRenewalPrice(subscriptionData, pricingConfig)
      return formatCurrency(renewalPrice)

  - name: "Verb-first Functions"
    summary: "Functions start with a verb: getUserById, calculateTotal, validateEmail, formatDate."
    what: "Functions do something — their names reflect that with a leading verb. The verb describes the action; the noun describes what it acts on."
    why: "A verb-first name makes the function's behavior immediately clear at the call site. You read code like a sentence: 'get user by ID', 'calculate total', 'validate email'."
    without: "Noun-first names are ambiguous. Is userById a getter? A type? A boolean check? The reader has to open the function to find out."
    bad: |
      function userData(id) { ... }
      function emailCheck(email) { ... }
      function priceWithTax(price, rate) { ... }
      function dateString(date) { ... }
    good: |
      function getUserById(id) { ... }
      function validateEmail(email) { ... }
      function calculatePriceWithTax(price, taxRate) { ... }
      function formatDate(date) { ... }

  - name: "Boolean Convention"
    summary: "Booleans read as yes/no questions: isLoading, hasError, canEdit — never status, active, flag."
    what: "Boolean variables and properties start with is, has, can, should, or was. They read as true/false questions in plain English."
    why: "if (isLoading) reads naturally. if (loading) is ambiguous — loading could be a string, an enum, or an object. The prefix enforces clarity at the usage site."
    without: "active could mean the user is active, the tab is active, or a filter is active. status could be a string, a number, or an enum. Bugs hide in this ambiguity."
    bad: |
      const loading = true
      const error = null
      const edit = user.role === 'admin'
      const visible = modal.state === 'open'

      if (loading) showSpinner()
      if (edit) showEditButton()
    good: |
      const isLoading = true
      const hasError = false
      const canEdit = user.role === 'admin'
      const isModalOpen = modal.state === 'open'

      if (isLoading) showSpinner()
      if (canEdit) showEditButton()

  - name: "UPPER_SNAKE_CASE Constants"
    summary: "Configuration values and magic numbers become named constants: MAX_RETRY_ATTEMPTS, API_BASE_URL."
    what: "Values that are fixed and meaningful get named constants in UPPER_SNAKE_CASE. They are defined once and referenced everywhere."
    why: "A named constant explains what the value means and why. Change one definition to update everywhere. It also makes the value easy to search for."
    without: "3000 appears 12 times in the codebase — as a timeout, a port, and a price. Change one and you have to audit all 12. A named constant collapses this into one change."
    bad: |
      setTimeout(retry, 3000)
      if (attempts > 5) throw new Error('Too many attempts')
      fetch('https://api.example.com/v2/users')
    good: |
      const RETRY_DELAY_MS = 3000
      const MAX_RETRY_ATTEMPTS = 5
      const API_BASE_URL = 'https://api.example.com/v2'

      setTimeout(retry, RETRY_DELAY_MS)
      if (attempts > MAX_RETRY_ATTEMPTS) throw new Error('Too many attempts')
      fetch(`${API_BASE_URL}/users`)

  - name: "No Magic Numbers"
    summary: "Every numeric literal in logic becomes a named constant. 3000 means nothing; DEBOUNCE_DELAY_MS does."
    what: "Raw numeric (or string) literals embedded in logic are replaced with named constants. The name explains the meaning; the constant holds the value."
    why: "Magic numbers are impossible to understand without full context. A named constant communicates intent at the call site — no comment needed."
    without: "setTimeout(fn, 3000) — is that 3 seconds, 3 retries, or a price limit? Six months later, nobody knows. Including the person who wrote it."
    bad: |
      if (password.length < 8) return 'Too short'
      if (price > 99900) applyDiscount(0.15)
      const token = jwt.sign(payload, secret, { expiresIn: 86400 })
    good: |
      const MIN_PASSWORD_LENGTH = 8
      const HIGH_VALUE_ORDER_THRESHOLD_CENTS = 99900
      const HIGH_VALUE_DISCOUNT_RATE = 0.15
      const TOKEN_EXPIRY_SECONDS = 86400  // 24h

      if (password.length < MIN_PASSWORD_LENGTH) return 'Too short'
      if (price > HIGH_VALUE_ORDER_THRESHOLD_CENTS) applyDiscount(HIGH_VALUE_DISCOUNT_RATE)
      const token = jwt.sign(payload, secret, { expiresIn: TOKEN_EXPIRY_SECONDS })

  - name: "Event Handlers"
    summary: "Handlers are prefixed with on or handle: onFormSubmit, handleAddToCart, onModalClose."
    what: "Functions that respond to events are named with on (when passed as props) or handle (when defined locally). The suffix describes the event."
    why: "This convention immediately signals the function is reactive — it runs in response to something. It prevents event handlers from being confused with utilities or getters."
    without: "submit, addCart, close — are these called directly or assigned to event listeners? Without the prefix, you have to read the JSX to know."
    bad: |
      function submit() { validateAndSend(form) }
      function addCart(item) { cart.add(item) }
      function modalX() { setOpen(false) }

      <form onSubmit={submit}>
      <button onClick={addCart}>Add</button>
      <button onClick={modalX}>✕</button>
    good: |
      function handleFormSubmit() { validateAndSend(form) }
      function handleAddToCart(item) { cart.add(item) }
      function handleModalClose() { setOpen(false) }

      <form onSubmit={handleFormSubmit}>
      <button onClick={() => handleAddToCart(item)}>Add</button>
      <button onClick={handleModalClose}>✕</button>
